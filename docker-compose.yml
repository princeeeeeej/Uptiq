services:
  postgres:
    image: postgres:16
    container_name: uptiq-postgres
    env_file:
      - ./packages/store/.env
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d uptiq"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: uptiq-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  migrate:
    build:
      context: .
      dockerfile: ./docker/Dockerfile.api
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - ./.env
    command: sh -c "bunx prisma@6.19.3 db push --schema=./packages/store/prisma/schema.prisma"
    restart: "no"

  api:
    image: uptiq-api:latest
    container_name: uptiq-api
    depends_on:
      migrate:
        condition: service_completed_successfully
    build:
      context: .
      dockerfile: ./docker/Dockerfile.api
    ports:
      - "8080:8080"
    env_file:
      - ./.env
      - ./packages/store/.env

  frontend:
    image: uptiq-frontend:latest
    container_name: uptiq-frontend
    depends_on:
      migrate:
        condition: service_completed_successfully
    build:
      context: .
      dockerfile: ./docker/Dockerfile.frontend
    ports:
      - "3000:3000"
    env_file:
      - ./.env

  pusher:
    image: uptiq-pusher:latest
    container_name: uptiq-pusher
    depends_on:
      migrate:
        condition: service_completed_successfully
    build:
      context: .
      dockerfile: ./docker/Dockerfile.pusher
    ports:
      - "5000:5000"
    env_file:
      - ./.env

  worker:
    image: uptiq-worker:latest
    container_name: uptiq-worker
    depends_on:
      migrate:
        condition: service_completed_successfully
    build:
      context: .
      dockerfile: ./docker/Dockerfile.worker
    ports:
      - "5001:5001"
    env_file:
      - ./.env

  dbwrite:
    image: uptiq-dbwriter:latest
    container_name: uptiq-dbwriter
    depends_on:
      migrate:
        condition: service_completed_successfully
    build:
      context: .
      dockerfile: ./docker/Dockerfile.dbwriter
    ports:
      - "5002:5002"
    env_file:
      - ./.env

volumes:
  pgdata:
  redis_data:
